# Bot SOLO SOL su Kraken Futures — DRY-RUN (paper trading) con dashboard FreqUI.
#
# AVVIO:   docker compose -f docker-compose-sol.yml up -d
# LOG:     docker compose -f docker-compose-sol.yml logs -f
# STOP:    docker compose -f docker-compose-sol.yml down
# UPDATE:  docker compose -f docker-compose-sol.yml pull   (poi up -d)
#
# Dashboard: http://127.0.0.1:8080   (utente: freqtrader  /  password: quella che imposti tu)
# IMPORTANTE: prima dell'avvio imposta la tua password in config-sol-krakenfutures.json
#             (campo api_server.password, ora "CAMBIA_QUESTA_PASSWORD").
# Guida passo-passo (Windows): docs/dry-run-windows.md
#
# Soldi SIMULATI (dry_run: true, portafoglio 500). Nessuna chiave API, nessun rischio reale.
# "restart: unless-stopped" = il bot si riavvia da solo dopo crash o riavvio del PC.

services:
  freqtrade-sol:
    image: freqtradeorg/freqtrade:stable
    container_name: tradingbot-sol
    restart: unless-stopped
    # FreqUI / API server SOLO in locale (127.0.0.1) per sicurezza.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - "./user_data:/freqtrade/user_data"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/sol.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-sol.sqlite
      --config /freqtrade/user_data/config-sol-krakenfutures.json
      --strategy SolLongShortStrategy
