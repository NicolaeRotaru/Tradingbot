# Trading bot — Freqtrade su Kraken (paper-first)
#
# Avvio in dry-run (paper trading):  docker compose up -d
# Log in tempo reale:                docker compose logs -f
# Stop:                              docker compose down
#
# "restart: unless-stopped" = il bot resta sempre acceso e si riavvia da solo
# dopo crash o riavvio della macchina (il tuo requisito 24/7).

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: tradingbot
    restart: unless-stopped
    # FreqUI / API server solo in locale (127.0.0.1) per sicurezza.
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - "./user_data:/freqtrade/user_data"
    # Credenziali FreqUI/API e (per il LIVE) chiavi exchange: lette da .env via FREQTRADE__...
    # Il .env NON e' mai committato (vedi .env.example). I default qui sotto valgono SOLO per il
    # paper locale (la dashboard e' gia' legata a 127.0.0.1). Per accesso esposto o LIVE: imposta
    # valori forti nel file .env. In dry-run le chiavi exchange restano vuote: il bot funziona senza.
    environment:
      FREQTRADE__API_SERVER__USERNAME: "${FREQTRADE__API_SERVER__USERNAME:-freqtrader}"
      FREQTRADE__API_SERVER__PASSWORD: "${FREQTRADE__API_SERVER__PASSWORD:-tradedesk_paper_local}"
      FREQTRADE__API_SERVER__JWT_SECRET_KEY: "${FREQTRADE__API_SERVER__JWT_SECRET_KEY:-paper_local_jwt_change_in_env}"
      FREQTRADE__API_SERVER__WS_TOKEN: "${FREQTRADE__API_SERVER__WS_TOKEN:-paper_local_ws_change_in_env}"
      FREQTRADE__EXCHANGE__KEY: "${FREQTRADE__EXCHANGE__KEY:-}"
      FREQTRADE__EXCHANGE__SECRET: "${FREQTRADE__EXCHANGE__SECRET:-}"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy StarterStrategy
